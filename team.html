<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team | Noorjahan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .italic-quote { font-family: 'Playfair Display', serif; font-style: italic; }
        .selection-white::selection { background: black; color: white; }
        .snap-container { scroll-snap-type: y mandatory; }
        .snap-section { scroll-snap-align: start; }

        /* Glassmorphic Header */
        .glass-header {
            background: rgba(253, 252, 251, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .header-scrolled {
            padding-top: 0.75rem !important;
            padding-bottom: 0.75rem !important;
            background: rgba(253, 252, 251, 0.9);
        }
        
        .header-scrolled .logo-img {
            width: 6rem !important;
        }

        @media (min-width: 768px) {
            .header-scrolled .logo-img {
                width: 7rem !important;
            }
        }

        /* Social Bar */
        #social-bar {
            transition: all 0.5s ease;
            transform: translateY(100px);
            opacity: 0;
        }
        #social-bar.visible {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body class="bg-[#FDFCFB] text-black selection-white">

    <!-- Header -->
    <header id="main-header" class="fixed top-0 left-0 w-full z-40 px-6 md:px-10 py-6 md:py-8 flex justify-between items-center glass-header">
        <a href="index.html" class="group">
            <img src="assets/logo.png" alt="Logo" class="logo-img w-28 md:w-40 h-auto transition-all duration-500">
        </a>
        <nav class="hidden md:flex space-x-12">
            <a href="index.html" class="text-[11px] tracking-[0.4em] uppercase font-bold hover:opacity-50 transition-opacity">Home</a>
            <a href="work.html" class="text-[11px] tracking-[0.4em] uppercase font-bold hover:opacity-50 transition-opacity">Work</a>
            <a href="team.html" class="text-[11px] tracking-[0.4em] uppercase font-bold hover:opacity-50 transition-opacity">Team</a>
            <a href="contact.html" class="text-[11px] tracking-[0.4em] uppercase font-bold hover:opacity-50 transition-opacity">Contact</a>
        </nav>
        <button class="md:hidden">
            <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
    </header>

    <!-- Scroll Indicator -->
    <div class="fixed bottom-12 right-6 md:bottom-32 md:right-8 z-40">
        <a href="contact.html" class="group block">
            <div class="bg-white/90 backdrop-blur-2xl text-black px-6 py-3 md:px-8 md:py-4 rounded-full flex items-center space-x-4 md:space-x-6 shadow-[0_10px_40px_-10px_rgba(0,0,0,0.1)] border border-black/5 relative overflow-hidden">
                <div class="flex flex-col items-start">
                    <span class="text-[8px] md:text-[9px] tracking-[0.4em] uppercase opacity-30 font-bold">Scroll Down</span>
                    <span class="text-[11px] md:text-xs tracking-[0.3em] uppercase font-bold opacity-60">Contact</span>
                </div>
                <div class="relative w-5 h-8 md:w-6 md:h-10 border border-black/10 rounded-full flex justify-center pt-1 md:pt-2">
                    <div class="scroll-dot w-1 h-1 bg-black/40 rounded-full hidden md:block"></div>
                </div>
            </div>
        </a>
    </div>

    <main class="h-screen overflow-y-auto snap-container scroll-smooth">
        <div id="team-container">
            <!-- Team members will be injected here -->
        </div>

        <!-- Social Bar (Visible at end) -->
        <div id="social-bar" class="w-full z-50 px-6 md:px-10 py-8 flex flex-col md:flex-row justify-between items-center bg-[#FDFCFB] border-t border-black/5">
            <div class="flex space-x-8 mb-6 md:mb-0">
                <a href="#" class="text-[11px] tracking-[0.4em] uppercase font-bold hover:opacity-50 transition-opacity">Instagram</a>
                <a href="#" class="text-[11px] tracking-[0.4em] uppercase font-bold hover:opacity-50 transition-opacity">Vimeo</a>
                <a href="#" class="text-[11px] tracking-[0.4em] uppercase font-bold hover:opacity-50 transition-opacity">LinkedIn</a>
            </div>
            <div class="flex flex-col items-center md:items-end space-y-2">
                <p class="text-[11px] tracking-[0.2em] uppercase opacity-30">© 2026 Noorjahan Productions</p>
                <p class="text-[11px] tracking-[0.2em] uppercase opacity-30 italic">Where Cinema becomes Life</p>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        gsap.registerPlugin(ScrollTrigger);

        const members = [
            {
                name: "Noorjahan",
                role: "Founder & Creative Director",
                bio: "With over two decades of experience in visual storytelling, Noorjahan leads the creative vision of the agency, ensuring every frame resonates with life.",
                image: "https://picsum.photos/seed/ceo/800/1000"
            },
            {
                name: "Julian Vane",
                role: "Head of Cinematography",
                bio: "Julian's mastery of light and shadow has defined the aesthetic of numerous award-winning films. He believes that every shot should be a painting.",
                image: "https://picsum.photos/seed/cino/800/1000"
            },
            {
                name: "Elena Rossi",
                role: "Lead Editor",
                bio: "Elena finds the rhythm in the chaos. Her surgical precision in the edit suite is what gives our films their unique emotional pulse.",
                image: "https://picsum.photos/seed/editor/800/1000"
            },
            {
                name: "Marcus Thorne",
                role: "Production Designer",
                bio: "Marcus builds worlds. His attention to detail in set design creates the immersive environments that our stories inhabit.",
                image: "https://picsum.photos/seed/designer/800/1000"
            },
            {
                name: "Sarah Chen",
                role: "Sound Architect",
                bio: "Sarah understands that cinema is half-heard. Her soundscapes provide the atmospheric depth that makes our visuals truly immersive.",
                image: "https://picsum.photos/seed/sound/800/1000"
            }
        ];

        const teamContainer = document.getElementById('team-container');

        members.forEach((member, index) => {
            const section = document.createElement('section');
            section.className = 'snap-section h-screen w-full flex flex-col md:flex-row items-center justify-center relative overflow-hidden pt-24 md:pt-40';
            
            const isEven = index % 2 === 0;
            
            section.innerHTML = `
                <!-- Desktop Layout -->
                <div class="hidden md:flex w-full h-full items-center ${isEven ? 'flex-row' : 'flex-row-reverse'} max-w-7xl mx-auto px-10">
                    <div class="w-1/3 aspect-[3/4] relative overflow-hidden group rounded-sm shadow-xl">
                        <img src="${member.image}" alt="${member.name}" class="w-full h-[120%] object-cover grayscale group-hover:grayscale-0 transition-all duration-[2000ms] ease-out member-img opacity-0 scale-110 parallax-img -top-[10%]" referrerpolicy="no-referrer">
                        <div class="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors duration-1000"></div>
                    </div>
                    <div class="w-2/3 h-full flex flex-col justify-center px-20 space-y-8 bg-[#FDFCFB]">
                        <div class="member-content opacity-0 translate-y-8">
                            <span class="text-xs tracking-[0.5em] uppercase font-bold opacity-30 block mb-4">${member.role}</span>
                            <h2 class="text-5xl lg:text-7xl font-serif italic mb-8">${member.name}</h2>
                            <p class="text-lg lg:text-xl font-light leading-relaxed opacity-70 max-w-xl">${member.bio}</p>
                        </div>
                        <div class="absolute bottom-10 ${isEven ? 'left-10' : 'right-10'} text-[10vw] font-serif italic opacity-[0.03] pointer-events-none">0${index + 1}</div>
                    </div>
                </div>

                <!-- Mobile Layout -->
                <div class="md:hidden w-full h-full flex flex-col pt-10">
                    <div class="h-1/2 w-full relative">
                        <img src="${member.image}" alt="${member.name}" class="w-full h-full object-cover grayscale" referrerpolicy="no-referrer">
                        <div class="absolute inset-0 bg-black/20"></div>
                    </div>
                    <div class="h-1/2 w-full p-8 flex flex-col justify-center space-y-4">
                        <span class="text-[10px] tracking-[0.4em] uppercase font-bold opacity-30">${member.role}</span>
                        <h2 class="text-4xl font-serif italic">${member.name}</h2>
                        <p class="text-base font-light opacity-70 leading-relaxed">${member.bio}</p>
                    </div>
                </div>
            `;
            teamContainer.appendChild(section);
        });

        // Intersection Observer for Animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target.querySelector('.member-img');
                    const content = entry.target.querySelector('.member-content');
                    
                    if (img) {
                        gsap.to(img, { opacity: 1, scale: 1, duration: 1.5, ease: "power2.out" });
                        
                        // Parallax for member image
                        gsap.to(img, {
                            yPercent: 15,
                            ease: "none",
                            scrollTrigger: {
                                trigger: entry.target,
                                start: "top bottom",
                                end: "bottom top",
                                scrub: true,
                                scroller: "main"
                            }
                        });
                    }
                    if (content) gsap.to(content, { opacity: 1, y: 0, duration: 1, delay: 0.3 });
                }
            });
        }, { threshold: 0.5 });

        document.querySelectorAll('.snap-section').forEach(section => observer.observe(section));

        // Scroll Dot Animation
        gsap.to('.scroll-dot', {
            y: 10,
            opacity: 0,
            duration: 2.5,
            repeat: -1,
            ease: "easeInOut"
        });

        // Header Scroll Logic
        const header = document.getElementById('main-header');
        const main = document.querySelector('main');
        
        main.addEventListener('scroll', () => {
            if (main.scrollTop > 50) {
                header.classList.add('header-scrolled');
            } else {
                header.classList.remove('header-scrolled');
            }
        });
    </script>
</body>
</html>
